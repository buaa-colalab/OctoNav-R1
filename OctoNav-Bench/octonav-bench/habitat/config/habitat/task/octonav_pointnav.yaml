defaults:
  - task_config_base
  - actions:
    - stop
    - move_forward
    - turn_left
    - turn_right
    - look_up
    - look_down
  - measurements:
    - distance_to_goal
    - success
    - spl
    - distance_to_goal_reward
    - top_down_map
  - lab_sensors:
    - octonav_instruction_sensor
  - _self_
  
actions:
  look_up:
    tilt_angle: 30
  look_down:
    tilt_angle: 30

type: Nav-v0
end_on_success: True
reward_measure: "distance_to_goal_reward"
success_measure: "spl"
goal_sensor_uuid: instruction

measurements:
  top_down_map:
    draw_goal_aabbs: False
